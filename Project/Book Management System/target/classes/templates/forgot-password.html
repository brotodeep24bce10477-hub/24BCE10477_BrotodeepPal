<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>
</head>
<body>

    <h2>Reset Password</h2>

    <!-- Error Message -->
    <div th:if="${error}">
        <p style="color:red;" th:text="${error}"></p>
    </div>

    <!-- Success Message -->
    <div th:if="${success}">
        <p style="color:green;" th:text="${success}"></p>
    </div>

    <form th:action="@{/forgot-password}"
          th:object="${forgotPasswordDTO}"
          method="post">

        <div>
            <label>Username:</label>
            <input type="text"
                   th:field="*{username}"
                   required>
        </div>

        <br>

        <div>
            <label>New Password:</label>
            <input type="password"
                   th:field="*{newPassword}"
                   required>
        </div>

        <br>

        <div>
            <label>Confirm Password:</label>
            <input type="password"
                   th:field="*{confirmPassword}"
                   required>
        </div>

        <br>

        <button type="submit">
            Reset Password
        </button>

    </form>

    <br>

    <a th:href="@{/login}">
        Back to Login
    </a>

</body>
</html>
