```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Book</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <h2>Add New Book</h2>

    <form th:action="@{/books/save}"
          th:object="${book}"
          method="post">

        <label>Title:</label>
        <input type="text"
               th:field="*{title}"
               required>
        <br><br>

        <label>Author:</label>
        <input type="text"
               th:field="*{author}"
               required>
        <br><br>

        <label>Genre:</label>
        <input type="text"
               th:field="*{genre}"
               required>
        <br><br>

        <label>Price:</label>
        <input type="number"
               step="0.01"
               th:field="*{price}"
               min="0"
               required>
        <br><br>

        <label>Quantity:</label>
        <input type="number"
               th:field="*{quantity}"
               min="0"
               required>
        <br><br>

        <label>Publication Year:</label>
        <input type="number"
               th:field="*{publicationYear}"
               min="1000"
               max="2100"
               required>
        <br><br>

        <label>Availability:</label>
        <input type="checkbox"
               th:field="*{availabilityStatus}">
        <br><br>

        <button type="submit"
                class="btn btn-add">
            Save Book
        </button>

        <a th:href="@{/books}"
           class="btn">
            Back to Books
        </a>

        <a th:href="@{/dashboard}"
           class="btn">
            Dashboard
        </a>

    </form>

</div>

</body>
</html>
```
