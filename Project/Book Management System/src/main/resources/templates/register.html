<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>

<body>

<h2>User Registration</h2>

<div th:if="${error}"
     th:text="${error}">
</div>

<form th:action="@{/register}"
      th:object="${registerRequest}"
      method="post">

    Username:

    <input type="text"
           th:field="*{username}"
           required>

    <br><br>

    Email:

    <input type="email"
           th:field="*{email}"
           required>

    <br><br>

    Password:

    <input type="password"
           th:field="*{password}"
           required>

    <br><br>

    <button type="submit">

        Register

    </button>

</form>

<a th:href="@{/login}">
    Back to Login
</a>

</body>
</html>
